<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E4068"/>
      <stop offset="100%" stop-color="#142D4A"/>
    </linearGradient>
    <linearGradient id="cylBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C2F90"/>
      <stop offset="30%" stop-color="#7B4FB8"/>
      <stop offset="70%" stop-color="#7B4FB8"/>
      <stop offset="100%" stop-color="#4A2575"/>
    </linearGradient>
    <linearGradient id="topCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#30E0FF"/>
      <stop offset="100%" stop-color="#00A0C0"/>
    </linearGradient>
    <linearGradient id="botCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A2575"/>
      <stop offset="100%" stop-color="#3A1860"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="128" cy="128" r="118" fill="none" stroke="#2A5580" stroke-width="1.5" opacity="0.5"/>

  <!-- Database cylinder -->
  <g filter="url(#shadow)">
    <!-- Cylinder body -->
    <rect x="58" y="72" width="140" height="120" fill="url(#cylBody)" rx="0"/>

    <!-- Bottom ellipse -->
    <ellipse cx="128" cy="192" rx="70" ry="22" fill="url(#botCap)"/>

    <!-- Side edges (darker) -->
    <line x1="58" y1="72" x2="58" y2="192" stroke="#4A2575" stroke-width="2"/>
    <line x1="198" y1="72" x2="198" y2="192" stroke="#4A2575" stroke-width="2"/>

    <!-- Middle data stripe 1 - cyan -->
    <ellipse cx="128" cy="120" rx="70" ry="18" fill="none" stroke="#00B4D8" stroke-width="2.5" opacity="0.7"/>
    <!-- Middle data stripe 2 -->
    <ellipse cx="128" cy="152" rx="70" ry="18" fill="none" stroke="#00B4D8" stroke-width="2" opacity="0.4"/>

    <!-- Cover body top to hide rect above top ellipse -->
    <rect x="59" y="50" width="138" height="26" fill="url(#bg)"/>

    <!-- Top ellipse - cyan -->
    <ellipse cx="128" cy="72" rx="70" ry="22" fill="url(#topCap)"/>

    <!-- Top ellipse shine -->
    <ellipse cx="120" cy="67" rx="45" ry="10" fill="white" opacity="0.2"/>

    <!-- Top ellipse outline -->
    <ellipse cx="128" cy="72" rx="70" ry="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Data rows hint on cylinder face -->
  <g stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25">
    <line x1="80" y1="100" x2="176" y2="100"/>
    <line x1="80" y1="110" x2="160" y2="110"/>
    <line x1="80" y1="135" x2="176" y2="135"/>
    <line x1="80" y1="145" x2="150" y2="145"/>
    <line x1="80" y1="170" x2="170" y2="170"/>
    <line x1="80" y1="180" x2="145" y2="180"/>
  </g>

  <!-- Magnifying glass / query symbol (bottom right) -->
  <g transform="translate(185,195)" opacity="0.8" filter="url(#glow)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#00B4D8" stroke-width="3"/>
    <line x1="10" y1="10" x2="20" y2="20" stroke="#00B4D8" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>
