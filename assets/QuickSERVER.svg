<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E4068"/>
      <stop offset="100%" stop-color="#142D4A"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B4FB8"/>
      <stop offset="100%" stop-color="#5C2F90"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20CCF0"/>
      <stop offset="100%" stop-color="#00A0C0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="128" cy="128" r="118" fill="none" stroke="#2A5580" stroke-width="1.5" opacity="0.5"/>

  <!-- Connection lines (behind nodes) -->
  <g stroke="#00B4D8" stroke-width="3.5" opacity="0.6" stroke-linecap="round">
    <line x1="128" y1="128" x2="62" y2="62"/>
    <line x1="128" y1="128" x2="194" y2="62"/>
    <line x1="128" y1="128" x2="194" y2="194"/>
    <line x1="128" y1="128" x2="62" y2="194"/>
    <!-- Cross connections between satellites -->
    <line x1="62" y1="62" x2="194" y2="62" stroke-width="2" opacity="0.3"/>
    <line x1="194" y1="62" x2="194" y2="194" stroke-width="2" opacity="0.3"/>
    <line x1="194" y1="194" x2="62" y2="194" stroke-width="2" opacity="0.3"/>
    <line x1="62" y1="194" x2="62" y2="62" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Glowing connection lines -->
  <g stroke="#00B4D8" stroke-width="2" opacity="0.4" stroke-linecap="round" filter="url(#glow)">
    <line x1="128" y1="128" x2="62" y2="62"/>
    <line x1="128" y1="128" x2="194" y2="62"/>
    <line x1="128" y1="128" x2="194" y2="194"/>
    <line x1="128" y1="128" x2="62" y2="194"/>
  </g>

  <!-- Satellite nodes -->
  <g filter="url(#shadow)">
    <circle cx="62" cy="62" r="18" fill="url(#nodeGrad)"/>
    <circle cx="194" cy="62" r="18" fill="url(#nodeGrad)"/>
    <circle cx="194" cy="194" r="18" fill="url(#nodeGrad)"/>
    <circle cx="62" cy="194" r="18" fill="url(#nodeGrad)"/>
  </g>
  <!-- Node highlights -->
  <circle cx="58" cy="58" r="6" fill="white" opacity="0.3"/>
  <circle cx="190" cy="58" r="6" fill="white" opacity="0.3"/>
  <circle cx="190" cy="190" r="6" fill="white" opacity="0.3"/>
  <circle cx="58" cy="190" r="6" fill="white" opacity="0.3"/>

  <!-- Central hub -->
  <circle cx="128" cy="128" r="32" fill="url(#hubGrad)" filter="url(#shadow)"/>
  <circle cx="128" cy="128" r="30" fill="none" stroke="#9B6FD8" stroke-width="1.5" opacity="0.5"/>

  <!-- Hub icon: arrows pointing outward (message routing) -->
  <g fill="white" opacity="0.95">
    <!-- Up arrow -->
    <polygon points="128,106 134,116 122,116"/>
    <!-- Right arrow -->
    <polygon points="150,128 140,122 140,134"/>
    <!-- Down arrow -->
    <polygon points="128,150 134,140 122,140"/>
    <!-- Left arrow -->
    <polygon points="106,128 116,122 116,134"/>
  </g>

  <!-- Center dot -->
  <circle cx="128" cy="128" r="6" fill="white" opacity="0.9"/>
</svg>
