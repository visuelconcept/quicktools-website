<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E4068"/>
      <stop offset="100%" stop-color="#142D4A"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3555"/>
      <stop offset="100%" stop-color="#0F2035"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="128" cy="128" r="118" fill="none" stroke="#2A5580" stroke-width="1.5" opacity="0.5"/>

  <!-- Clock face -->
  <circle cx="128" cy="128" r="95" fill="url(#faceGrad)"/>

  <!-- Clock ring - cyan -->
  <circle cx="128" cy="128" r="95" fill="none" stroke="#00B4D8" stroke-width="5"/>
  <!-- Inner ring glow -->
  <circle cx="128" cy="128" r="92" fill="none" stroke="#00B4D8" stroke-width="1" opacity="0.3" filter="url(#glow)"/>

  <!-- Hour marks -->
  <g stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <!-- 12 -->
    <line x1="128" y1="42" x2="128" y2="58"/>
    <!-- 3 -->
    <line x1="214" y1="128" x2="198" y2="128"/>
    <!-- 6 -->
    <line x1="128" y1="214" x2="128" y2="198"/>
    <!-- 9 -->
    <line x1="42" y1="128" x2="58" y2="128"/>
  </g>

  <!-- Minor marks -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <!-- 1 -->
    <line x1="170" y1="50" x2="164" y2="62"/>
    <!-- 2 -->
    <line x1="206" y1="86" x2="194" y2="92"/>
    <!-- 4 -->
    <line x1="206" y1="170" x2="194" y2="164"/>
    <!-- 5 -->
    <line x1="170" y1="206" x2="164" y2="194"/>
    <!-- 7 -->
    <line x1="86" y1="206" x2="92" y2="194"/>
    <!-- 8 -->
    <line x1="50" y1="170" x2="62" y2="164"/>
    <!-- 10 -->
    <line x1="50" y1="86" x2="62" y2="92"/>
    <!-- 11 -->
    <line x1="86" y1="50" x2="92" y2="62"/>
  </g>

  <!-- Hour hand - purple (pointing ~10 o'clock = 300 deg) -->
  <line x1="128" y1="128" x2="98" y2="80" stroke="#7B4FB8" stroke-width="8" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="128" y1="128" x2="98" y2="80" stroke="#9B6FD8" stroke-width="5" stroke-linecap="round"/>

  <!-- Minute hand - cyan (pointing ~2 o'clock = 60 deg) -->
  <line x1="128" y1="128" x2="184" y2="82" stroke="#009AB8" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="128" y1="128" x2="184" y2="82" stroke="#00B4D8" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Center cap -->
  <circle cx="128" cy="128" r="8" fill="#6B3FA0" stroke="white" stroke-width="2"/>
  <circle cx="128" cy="128" r="3" fill="white"/>

  <!-- Small lightning bolt (timer/trigger symbol) at bottom -->
  <g transform="translate(128,178)" fill="#00B4D8" opacity="0.7">
    <polygon points="-4,-10 2,-2 -1,-2 4,10 -2,2 1,2"/>
  </g>
</svg>
